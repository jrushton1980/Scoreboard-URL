<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoreboard Control</title>

<style>
body {
  background-color: #111;
  color: #fff;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* SETTINGS */
.settings-btn {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 28px;
  background: none;
  border: none;
  color: white;
  z-index: 9999;
}

/* SCOREBOARD */
.scoreboard {
  width: 95%;
  background: #1e1e1e;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 12px;
  text-align: center;
}

.team-row {
  display: flex;
  justify-content: space-around;
  align-items: flex-start;
}

.team-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 40%;
}

.logo {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 2px solid #fff;
  object-fit: cover;
  margin-bottom: 4px;
}

.team-name {
  font-size: 18px;
  font-weight: bold;
}

.team-goals {
  font-size: 36px;
  font-weight: bold;
}

.team-shots {
  font-size: 18px;
  opacity: 0.9;
}

#dash {
  font-size: 28px;
  align-self: center;
}

/* CLOCK */
.clock-section {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 95%;
  background: #1d1d1d;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 12px;
}

.clock-section button {
  flex: 1;
  padding: 14px 0;
  margin: 0 4px;
  background: #333;
  border: none;
  color: white;
  border-radius: 8px;
}

#timer {
  font-size: 28px;
  font-weight: bold;
}

#period {
  font-size: 18px;
}

/* START */
#startStopBtn {
  width: 95%;
  font-size: 28px;
  padding: 40px 0;
  border-radius: 12px;
  border: none;
  color: white;
  margin-bottom: 16px;
}

.pulse {
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

/* BUTTONS */
.team-controls {
  display: flex;
  width: 95%;
  gap: 10px;
}

.team-column {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.team-column button.plus {
  font-size: 26px;
  padding: 40px 0;
  background: #555;
  border: none;
  color: white;
  border-radius: 10px;
}

.team-column button.minus {
  font-size: 24px;
  padding: 12px 0;
  background: #777;
  border: none;
  color: white;
  border-radius: 10px;
}

/* ANIMATION */
.flash-green {
  animation: flashGreen 1s ease;
  font-weight: bold;
}

.flash-red {
  animation: flashRed 1s ease;
  font-weight: bold;
}

@keyframes flashGreen {
  0% { color: white; }
  40% { color: #28a745; }
  100% { color: white; }
}

@keyframes flashRed {
  0% { color: white; }
  40% { color: #dc3545; }
  100% { color: white; }
}
</style>
</head>

<body>

<button class="settings-btn" onclick="openSettings()">⚙️</button>

<div class="scoreboard">

  <div class="team-row">

    <div class="team-block">
      <img id="teamALogo" class="logo">
      <div class="team-name" id="teamAName">Team A</div>
      <div class="team-goals" id="teamAScore">0</div>
      <div class="team-shots" id="teamAShots">Shots: 0</div>
    </div>

    <div id="dash">-</div>

    <div class="team-block">
      <img id="teamBLogo" class="logo">
      <div class="team-name" id="teamBName">Team B</div>
      <div class="team-goals" id="teamBScore">0</div>
      <div class="team-shots" id="teamBShots">Shots: 0</div>
    </div>

  </div>
</div>

<div class="clock-section">
  <button onclick="setPeriod()">Period</button>

  <div style="flex:2;text-align:center;">
    <div id="timer">20:00</div>
    <div id="period">Period 1</div>
  </div>

  <button onclick="setClock()">Clock</button>
</div>

<button id="startStopBtn" onclick="toggleClock()" style="background:#28a745;">Start</button>

<div class="team-controls">
  <div class="team-column">
    <button class="plus" onclick="updateShots('A',1)">+1 Shot</button>
    <button class="minus" onclick="updateShots('A',-1)">-1 Shot</button>
    <button class="plus" onclick="updateScore('A',1)">+1 Goal</button>
    <button class="minus" onclick="updateScore('A',-1)">+1 Goal</button>
  </div>

  <div class="team-column">
    <button class="plus" onclick="updateShots('B',1)">+1 Shot</button>
    <button class="minus" onclick="updateShots('B',-1)">-1 Shot</button>
    <button class="plus" onclick="updateScore('B',1)">+1 Goal</button>
    <button class="minus" onclick="updateScore('B',-1)">+1 Goal</button>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyD8EO--akOZZZNKGOEHk4mpc4Gk-1WXbiHyvVIOaSmxI5f20Wiwwh7XIyEc4TaOlxD/exec";

let state = {
  teamAName:"Team A",
  teamAScore:0,
  teamAShots:0,
  teamBName:"Team B",
  teamBScore:0,
  teamBShots:0,
  Period:1,
  TimerSeconds:1200,
  Running:false
};

let timerInterval;

/* FIXED CORE FUNCTIONS */
function updateUI(){
  document.getElementById('teamAName').textContent=state.teamAName;
  document.getElementById('teamBName').textContent=state.teamBName;
  document.getElementById('teamAScore').textContent=state.teamAScore;
  document.getElementById('teamBScore').textContent=state.teamBScore;
  document.getElementById('teamAShots').textContent=`Shots: ${state.teamAShots}`;
  document.getElementById('teamBShots').textContent=`Shots: ${state.teamBShots}`;
  document.getElementById('timer').textContent=formatTime(state.TimerSeconds);
  document.getElementById('period').textContent=`Period ${state.Period}`;

  const btn=document.getElementById('startStopBtn');
  btn.textContent=state.Running?"Stop":"Start";
  btn.style.background=state.Running?"#dc3545":"#28a745";
  btn.classList.toggle("pulse",state.Running);
}

function formatTime(sec){
  const m=Math.floor(sec/60);
  const s=sec%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function toggleClock(){
  state.Running=!state.Running;
  updateUI();
  pushUpdate("Running",state.Running);
}

/* SCORE */
function updateScore(team,change){
  const key=team==="A"?"teamAScore":"teamBScore";
  state[key]=Math.max(0,state[key]+change);
  updateUI();
  pushUpdate(key,state[key]);
}

/* SHOTS */
function updateShots(team,change){
  const key=team==="A"?"teamAShots":"teamBShots";
  state[key]=Math.max(0,state[key]+change);
  updateUI();
  pushUpdate(key,state[key]);
}

/* CLOCK */
function setClock(){
  const input=prompt("MM:SS");
  if(!input) return;
  const [m,s]=input.split(":").map(Number);
  state.TimerSeconds=m*60+s;
  updateUI();
  pushUpdate("TimerSeconds",state.TimerSeconds);
}

function setPeriod(){
  const p=parseInt(prompt("Period"));
  if(p>0){
    state.Period=p;
    updateUI();
    pushUpdate("Period",p);
  }
}

/* SYNC */
async function pushUpdate(field,value){
  await fetch(`${SCRIPT_URL}?update=true&field=${field}&value=${value}`);
}

/* LOGOS + INIT */
async function init(){
  const res=await fetch(SCRIPT_URL);
  const data=await res.json();
  Object.assign(state,data);

  document.getElementById("teamALogo").src=data.teamALogo;
  document.getElementById("teamBLogo").src=data.teamBLogo;

  updateUI();
}

init();
</script>

</body>
</html>
