<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoreboard Control</title>

<style>
body {
  background-color: #111;
  color: #fff;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ================= SETTINGS BUTTON ================= */
.settings-btn {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: none;
  border: none;
  color: #fff;
  font-size: 28px;
  z-index: 9999;
  cursor: pointer;
}

/* ================= SCOREBOARD ================= */
.scoreboard {
  width: 95%;
  background: #1e1e1e;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 12px;
  text-align: center;
}

/* LOGO + TEAM BLOCK LAYOUT */
.team-row {
  display: flex;
  justify-content: space-around;
  align-items: flex-start;
  margin-bottom: 6px;
}

/* each team becomes a vertical stack */
.team-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 40%;
}

/* LOGOS */
.logo {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid #fff;
  margin-bottom: 4px;
}

/* TEAM NAME */
.team-name {
  font-weight: bold;
  font-size: 18px;
  margin-bottom: 2px;
}

/* GOALS (slightly larger per request) */
.team-goals {
  font-size: 34px;
  font-weight: bold;
  margin-top: 2px;
  margin-bottom: 2px;
}

/* SHOTS */
.team-shots {
  font-size: 18px;
  opacity: 0.9;
}

/* SCORE CENTER (kept clean) */
.score-row {
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 36px;
  margin-top: 6px;
}

#dash {
  margin: 0 10px;
}

/* SHOTS ROW (hidden redundancy removed visually but kept aligned under blocks if needed) */
.shots-row {
  display: none;
}

/* ================= BUTTONS ================= */
button {
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.04s ease, opacity 0.04s ease;
}

button:active {
  transform: scale(0.90);
  opacity: 0.7;
}

/* CLOCK */
.clock-section {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 95%;
  background: #1d1d1d;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 12px;
}

.clock-section button {
  flex: 1;
  font-size: 18px;
  padding: 14px 0;
  margin: 0 4px;
  border-radius: 8px;
  border: none;
  background-color: #333;
  color: #fff;
}

#timer {
  font-size: 28px;
  font-weight: bold;
  text-align: center;
}

#period {
  font-size: 18px;
  text-align: center;
}

/* START BUTTON */
#startStopBtn {
  width: 95%;
  font-size: 28px;
  padding: 40px 0;
  border-radius: 12px;
  border: none;
  color: white;
  background-color: #28a745;
  margin-bottom: 16px;
}

.pulse {
  animation: pulseAnim 1.2s infinite;
}

@keyframes pulseAnim {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

/* TEAM BUTTONS */
.team-controls {
  display: flex;
  justify-content: space-between;
  width: 95%;
  gap: 10px;
}

.team-column {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.team-column button.plus {
  font-size: 26px; /* slightly larger per request */
  padding: 40px 0;
  border-radius: 10px;
  border: none;
  background-color: #555;
  color: #fff;
}

.team-column button.minus {
  font-size: 24px;
  padding: 12px 0;
  border-radius: 10px;
  border: none;
  background-color: #777;
  color: #fff;
}

/* SCORE FEEDBACK */
.flash-green {
  animation: flashGreen 1s ease;
  font-weight: bold;
}

.flash-red {
  animation: flashRed 1s ease;
  font-weight: bold;
}

@keyframes flashGreen {
  0% { color: #fff; }
  40% { color: #28a745; }
  100% { color: #fff; }
}

@keyframes flashRed {
  0% { color: #fff; }
  40% { color: #dc3545; }
  100% { color: #fff; }
}
</style>
</head>

<body>

<!-- FIXED CENTERED GEAR -->
<button class="settings-btn" onclick="openSettings()">⚙️</button>

<div class="scoreboard">

  <div class="team-row">

    <!-- TEAM A -->
    <div class="team-block">
      <img id="teamALogo" class="logo">
      <div class="team-name" id="teamAName">Team A</div>
      <div class="team-goals" id="teamAScore">0</div>
      <div class="team-shots" id="teamAShots">Shots: 0</div>
    </div>

    <div id="dash">-</div>

    <!-- TEAM B -->
    <div class="team-block">
      <img id="teamBLogo" class="logo">
      <div class="team-name" id="teamBName">Team B</div>
      <div class="team-goals" id="teamBScore">0</div>
      <div class="team-shots" id="teamBShots">Shots: 0</div>
    </div>

  </div>

</div>

<div class="clock-section">
  <button onclick="setPeriod()">Period</button>

  <div style="flex:2;">
    <div id="timer">20:00</div>
    <div id="period">Period 1</div>
  </div>

  <button onclick="setClock()">Clock</button>
</div>

<button id="startStopBtn" onclick="toggleClock()">Start</button>

<div class="team-controls">
  <div class="team-column">
    <button class="plus" onclick="updateShots('A',1)">+1 Shot</button>
    <button class="minus" onclick="updateShots('A',-1)">-1 Shot</button>
    <button class="plus" onclick="updateScore('A',1)">+1 Goal</button>
    <button class="minus" onclick="updateScore('A',-1)">-1 Goal</button>
  </div>

  <div class="team-column">
    <button class="plus" onclick="updateShots('B',1)">+1 Shot</button>
    <button class="minus" onclick="updateShots('B',-1)">-1 Shot</button>
    <button class="plus" onclick="updateScore('B',1)">+1 Goal</button>
    <button class="minus" onclick="updateScore('B',-1)">-1 Goal</button>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyD8EO--akOZZZNKGOEHk4mpc4Gk-1WXbiHyvVIOaSmxI5f20Wiwwh7XIyEc4TaOlxD/exec";

let state = {
  teamAName:"Team A",
  teamAScore:0,
  teamAShots:0,
  teamBName:"Team B",
  teamBScore:0,
  teamBShots:0,
  Period:1,
  TimerSeconds:1200,
  Running:false
};

let timerInterval;

function updateUI(){
  document.getElementById('teamAName').textContent=state.teamAName;
  document.getElementById('teamBName').textContent=state.teamBName;

  document.getElementById('teamAScore').textContent=state.teamAScore;
  document.getElementById('teamBScore').textContent=state.teamBScore;

  document.getElementById('teamAShots').textContent=`Shots: ${state.teamAShots}`;
  document.getElementById('teamBShots').textContent=`Shots: ${state.teamBShots}`;

  document.getElementById('timer').textContent=formatTime(state.TimerSeconds);
  document.getElementById('period').textContent=`Period ${state.Period}`;

  const btn=document.getElementById('startStopBtn');
  btn.textContent=state.Running?"Stop":"Start";
  btn.style.backgroundColor=state.Running?"#dc3545":"#28a745";
  btn.classList.toggle("pulse", state.Running);
}

function formatTime(sec){
  const m=Math.floor(sec/60);
  const s=sec%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

/* timer + updates unchanged for brevity */
async function init(){
  try{
    const res=await fetch(SCRIPT_URL);
    const data=await res.json();
    Object.assign(state,data);

    document.getElementById("teamALogo").src=data.teamALogo;
    document.getElementById("teamBLogo").src=data.teamBLogo;

  } catch(e){}
  updateUI();
}

init();
</script>

</body>
</html>
