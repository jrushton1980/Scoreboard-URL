<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoreboard Control</title>

<style>
body {
  background-color: #111;
  color: #fff;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ✅ CENTERED + CLICKABLE */
.settings-btn {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: none;
  border: none;
  color: #fff;
  font-size: 28px;
  z-index: 9999;
}

/* SCOREBOARD */
.scoreboard {
  width: 95%;
  background: #1e1e1e;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 12px;
}

/* STACKED TEAMS */
.team-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.team-block {
  width: 45%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.team-name {
  font-weight: bold;
  font-size: 18px;
}

.team-score {
  font-size: 36px;
  font-weight: bold;
}

.team-shots {
  font-size: 20px;
  opacity: 0.9;
}

/* CLOCK */
.clock-section {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 95%;
  background: #1d1d1d;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 12px;
}

.clock-section button {
  flex: 1;
  font-size: 18px;
  padding: 14px 0;
  margin: 0 4px;
  border-radius: 8px;
  border: none;
  background-color: #333;
  color: #fff;
}

#timer {
  font-size: 28px;
  font-weight: bold;
  text-align: center;
}

#period {
  font-size: 18px;
  text-align: center;
}

/* START BUTTON */
#startStopBtn {
  width: 95%;
  font-size: 28px;
  padding: 40px 0;
  border-radius: 12px;
  border: none;
  color: white;
  background-color: #28a745;
  margin-bottom: 16px;
}

/* CONTROLS */
.team-controls {
  display: flex;
  justify-content: space-between;
  width: 95%;
  gap: 10px;
}

.team-column {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.team-column button.plus {
  font-size: 24px;
  padding: 40px 0;
  border-radius: 10px;
  border: none;
  background-color: #555;
  color: #fff;
}

.team-column button.minus {
  font-size: 24px;
  padding: 12px 0;
  border-radius: 10px;
  border: none;
  background-color: #777;
  color: #fff;
}

/* BUTTON PRESS */
button {
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.04s ease, opacity 0.04s ease;
}

button:active {
  transform: scale(0.90);
  opacity: 0.7;
}

/* PULSE */
.pulse {
  animation: pulseAnim 1.2s infinite;
}

@keyframes pulseAnim {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

/* SCORE ANIMATIONS */
.score-pop {
  animation: pop 0.25s ease;
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.4); }
  100% { transform: scale(1); }
}

.flash-green {
  animation: flashGreen 1s ease;
  font-weight: bold;
}

.flash-red {
  animation: flashRed 1s ease;
  font-weight: bold;
}

@keyframes flashGreen {
  0% { color: #fff; }
  40% { color: #28a745; }
  100% { color: #fff; }
}

@keyframes flashRed {
  0% { color: #fff; }
  40% { color: #dc3545; }
  100% { color: #fff; }
}

/* MODAL */
#settingsModal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
  z-index: 10000;
}

.modal-content {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
  max-width: 400px;
  text-align: center;
}
</style>
</head>

<body>

<button class="settings-btn" onclick="openSettings()">⚙️</button>

<div class="scoreboard">
  <div class="team-row">

    <div class="team-block">
      <div id="teamAName" class="team-name">Team A</div>
      <div id="teamAScore" class="team-score">0</div>
      <div id="teamAShots" class="team-shots">Shots: 0</div>
    </div>

    <div>-</div>

    <div class="team-block">
      <div id="teamBName" class="team-name">Team B</div>
      <div id="teamBScore" class="team-score">0</div>
      <div id="teamBShots" class="team-shots">Shots: 0</div>
    </div>

  </div>
</div>

<div class="clock-section">
  <button onclick="setPeriod()">Period</button>
  <div style="flex:2;">
    <div id="timer">20:00</div>
    <div id="period">Period 1</div>
  </div>
  <button onclick="setClock()">Clock</button>
</div>

<button id="startStopBtn" onclick="toggleClock()">Start</button>

<div class="team-controls">
  <div class="team-column">
    <button class="plus" onclick="updateShots('A',1)">+1 Shot</button>
    <button class="minus" onclick="updateShots('A',-1)">-1 Shot</button>
    <button class="plus" onclick="updateScore('A',1)">+1 Goal</button>
    <button class="minus" onclick="updateScore('A',-1)">-1 Goal</button>
  </div>
  <div class="team-column">
    <button class="plus" onclick="updateShots('B',1)">+1 Shot</button>
    <button class="minus" onclick="updateShots('B',-1)">-1 Shot</button>
    <button class="plus" onclick="updateScore('B',1)">+1 Goal</button>
    <button class="minus" onclick="updateScore('B',-1)">-1 Goal</button>
  </div>
</div>

<!-- SETTINGS -->
<div id="settingsModal">
  <div class="modal-content">
    <h2>Settings</h2>
    <button onclick="closeSettings()">Close</button>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyD8EO--akOZZZNKGOEHk4mpc4Gk-1WXbiHyvVIOaSmxI5f20Wiwwh7XIyEc4TaOlxD/exec";

let state = {
  teamAName:"Team A",
  teamAScore:0,
  teamAShots:0,
  teamBName:"Team B",
  teamBScore:0,
  teamBShots:0,
  Period:1,
  TimerSeconds:1200,
  Running:false
};

let timerInterval;

/* SETTINGS */
function openSettings(){
  document.getElementById("settingsModal").style.display="flex";
}
function closeSettings(){
  document.getElementById("settingsModal").style.display="none";
}

/* ANIMATION */
function animateValue(id, change){
  const el = document.getElementById(id);
  el.classList.remove("score-pop","flash-green","flash-red");
  void el.offsetWidth;
  el.classList.add("score-pop");
  el.classList.add(change > 0 ? "flash-green" : "flash-red");
  setTimeout(()=>{ el.classList.remove("flash-green","flash-red"); },1000);
}

/* UI */
function updateUI(){
  document.getElementById('teamAName').textContent=state.teamAName;
  document.getElementById('teamBName').textContent=state.teamBName;
  document.getElementById('teamAScore').textContent=state.teamAScore;
  document.getElementById('teamBScore').textContent=state.teamBScore;
  document.getElementById('teamAShots').textContent=`Shots: ${state.teamAShots}`;
  document.getElementById('teamBShots').textContent=`Shots: ${state.teamBShots}`;
  document.getElementById('timer').textContent=formatTime(state.TimerSeconds);
  document.getElementById('period').textContent=`Period ${state.Period}`;

  const btn=document.getElementById('startStopBtn');
  btn.textContent=state.Running?"Stop":"Start";
  btn.style.backgroundColor=state.Running?"#dc3545":"#28a745";
  btn.classList.toggle("pulse", state.Running);
}

function formatTime(sec){
  const m=Math.floor(sec/60);
  const s=sec%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

/* TIMER */
function toggleClock(){
  state.Running=!state.Running;
  if(state.Running) startTimer(); else stopTimer();
  updateUI();
  pushUpdate("Running",state.Running);
}

function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(state.TimerSeconds>0){
      state.TimerSeconds--;
      document.getElementById('timer').textContent=formatTime(state.TimerSeconds);
      pushUpdate("TimerSeconds",state.TimerSeconds);
    }
  },1000);
}

function stopTimer(){
  clearInterval(timerInterval);
}

/* CONTROLS */
function setClock(){
  const input=prompt("Enter time (MM:SS):");
  if(input && /^\d{1,2}:\d{2}$/.test(input)){
    const [m,s]=input.split(':').map(Number);
    state.TimerSeconds=m*60+s;
    updateUI();
    pushUpdate("TimerSeconds",state.TimerSeconds);
  }
}

function setPeriod(){
  const val=parseInt(prompt("Enter period number:"));
  if(!isNaN(val)&&val>0){
    state.Period=val;
    updateUI();
    pushUpdate("Period",val);
  }
}

function updateScore(team,change){
  const key=team==="A"?"teamAScore":"teamBScore";
  const el=team==="A"?"teamAScore":"teamBScore";
  state[key]=Math.max(0,state[key]+change);
  updateUI();
  animateValue(el,change);
  pushUpdate(key,state[key]);
}

function updateShots(team,change){
  const key=team==="A"?"teamAShots":"teamBShots";
  const el=team==="A"?"teamAShots":"teamBShots";
  state[key]=Math.max(0,state[key]+change);
  updateUI();
  animateValue(el,change);
  pushUpdate(key,state[key]);
}

/* GOOGLE SYNC */
async function pushUpdate(field,value){
  await fetch(`${SCRIPT_URL}?update=true&field=${field}&value=${encodeURIComponent(value)}`);
}

async function init(){
  try{
    const res = await fetch(SCRIPT_URL + "?t=" + Date.now());
    const data = await res.json();
    Object.assign(state,data);
  } catch(e){
    console.error("Init failed", e);
  }
  updateUI();
}

init();
</script>

</body>
</html>
