<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoreboard Control</title>

<style>
body {
  background-color: #111;
  color: #fff;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* SETTINGS */
.settings-btn {
  position: fixed;
  top: 10px;
  right: 10px;
  background: none;
  border: none;
  color: #fff;
  font-size: 28px;
  cursor: pointer;
}

/* SCOREBOARD */
.scoreboard {
  width: 95%;
  background: #1e1e1e;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 12px;
  text-align: center;
}

/* =========================
   TEAM LAYOUT (UPDATED ONLY)
   ========================= */
.team-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

/* NEW: centered stack per team */
.team-block {
  width: 42%;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

/* NEW: logos */
.team-logo {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid #fff;
  margin-bottom: 4px;
}

.team-name {
  font-size: 18px;
  font-weight: bold;
}

.team-goals {
  font-size: 36px;
  font-weight: bold;
  margin-top: 2px;
}

.team-shots {
  font-size: 18px;
  opacity: 0.9;
  margin-top: 2px;
}

/* CENTER DASH */
#dash {
  font-size: 28px;
  align-self: center;
}

/* CLOCK */
.clock-section {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 95%;
  background: #1d1d1d;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 12px;
}

.clock-section button {
  flex: 1;
  padding: 14px 0;
  margin: 0 4px;
  border-radius: 8px;
  border: none;
  background-color: #333;
  color: #fff;
}

#timer {
  font-size: 28px;
  font-weight: bold;
}

#period {
  font-size: 18px;
}

/* START BUTTON */
#startStopBtn {
  width: 95%;
  font-size: 28px;
  padding: 40px 0;
  border-radius: 12px;
  border: none;
  color: #fff;
  background-color: #28a745;
  margin-bottom: 16px;
}

/* CONTROLS (UNCHANGED) */
.team-controls {
  display: flex;
  justify-content: space-between;
  width: 95%;
  gap: 10px;
}

.team-column {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.team-column button.plus {
  font-size: 24px;
  padding: 40px 0;
  border-radius: 10px;
  border: none;
  background-color: #555;
  color: #fff;
}

.team-column button.minus {
  font-size: 24px;
  padding: 12px 0;
  border-radius: 10px;
  border: none;
  background-color: #777;
  color: #fff;
}
</style>
</head>

<body>

<button class="settings-btn" onclick="openSettings()">⚙️</button>

<div class="scoreboard">

  <div class="team-row">

    <!-- TEAM A -->
    <div class="team-block">
      <img id="teamALogo" class="team-logo">
      <div id="teamAName" class="team-name">Team A</div>
      <div id="teamAScore" class="team-goals">0</div>
      <div id="teamAShots" class="team-shots">Shots: 0</div>
    </div>

    <div id="dash">-</div>

    <!-- TEAM B -->
    <div class="team-block">
      <img id="teamBLogo" class="team-logo">
      <div id="teamBName" class="team-name">Team B</div>
      <div id="teamBScore" class="team-goals">0</div>
      <div id="teamBShots" class="team-shots">Shots: 0</div>
    </div>

  </div>
</div>

<div class="clock-section">
  <button onclick="setPeriod()">Period</button>

  <div style="flex:2;text-align:center;">
    <div id="timer">20:00</div>
    <div id="period">Period 1</div>
  </div>

  <button onclick="setClock()">Clock</button>
</div>

<button id="startStopBtn" onclick="toggleClock()">Start</button>

<div class="team-controls">
  <div class="team-column">
    <button class="plus" onclick="updateShots('A',1)">+1 Shot</button>
    <button class="minus" onclick="updateShots('A',-1)">-1 Shot</button>
    <button class="plus" onclick="updateScore('A',1)">+1 Goal</button>
    <button class="minus" onclick="updateScore('A',-1)">-1 Goal</button>
  </div>

  <div class="team-column">
    <button class="plus" onclick="updateShots('B',1)">+1 Shot</button>
    <button class="minus" onclick="updateShots('B',-1)">-1 Shot</button>
    <button class="plus" onclick="updateScore('B',1)">+1 Goal</button>
    <button class="minus" onclick="updateScore('B',-1)">-1 Goal</button>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyD8EO--akOZZZNKGOEHk4mpc4Gk-1WXbiHyvVIOaSmxI5f20Wiwwh7XIyEc4TaOlxD/exec";

let state = {
  teamAName:"Team A",
  teamAScore:0,
  teamAShots:0,
  teamBName:"Team B",
  teamBScore:0,
  teamBShots:0,
  Period:1,
  TimerSeconds:1200,
  Running:false
};

let timerInterval;

/* ONLY SAFE UI UPDATE */
function updateUI(){
  document.getElementById('teamAName').textContent=state.teamAName;
  document.getElementById('teamBName').textContent=state.teamBName;

  document.getElementById('teamAScore').textContent=state.teamAScore;
  document.getElementById('teamBScore').textContent=state.teamBScore;

  document.getElementById('teamAShots').textContent=`Shots: ${state.teamAShots}`;
  document.getElementById('teamBShots').textContent=`Shots: ${state.teamBShots}`;

  document.getElementById('timer').textContent=formatTime(state.TimerSeconds);
  document.getElementById('period').textContent=`Period ${state.Period}`;

  const btn=document.getElementById('startStopBtn');
  btn.textContent=state.Running?"Stop":"Start";
  btn.style.backgroundColor=state.Running?"#dc3545":"#28a745";
}

function formatTime(sec){
  const m=Math.floor(sec/60);
  const s=sec%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

/* TIMER */
function toggleClock(){
  state.Running=!state.Running;
  updateUI();
  pushUpdate("Running",state.Running);
}

function setClock(){
  const input=prompt("MM:SS");
  if(!input) return;
  const [m,s]=input.split(":").map(Number);
  state.TimerSeconds=m*60+s;
  updateUI();
  pushUpdate("TimerSeconds",state.TimerSeconds);
}

function setPeriod(){
  const p=parseInt(prompt("Period"));
  if(p>0){
    state.Period=p;
    updateUI();
    pushUpdate("Period",p);
  }
}

/* SCORE */
function updateScore(team,val){
  const key=team==="A"?"teamAScore":"teamBScore";
  state[key]=Math.max(0,state[key]+val);
  updateUI();
  pushUpdate(key,state[key]);
}

/* SHOTS */
function updateShots(team,val){
  const key=team==="A"?"teamAShots":"teamBShots";
  state[key]=Math.max(0,state[key]+val);
  updateUI();
  pushUpdate(key,state[key]);
}

/* SYNC */
async function pushUpdate(field,value){
  await fetch(`${SCRIPT_URL}?update=true&field=${field}&value=${value}`);
}

/* INIT + LOGOS ONLY */
async function init(){
  const res=await fetch(SCRIPT_URL);
  const data=await res.json();
  Object.assign(state,data);

  document.getElementById("teamALogo").src=data.teamALogo;
  document.getElementById("teamBLogo").src=data.teamBLogo;

  updateUI();
}

init();
</script>

</body>
</html>
