<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoreboard Control</title>

<style>
body {
  background:#111;
  color:#fff;
  font-family: Arial, sans-serif;
  margin:0;
  padding:10px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ================= SETTINGS ================= */
.settings-btn {
  position: fixed;
  top: 10px;
  right: 10px;
  font-size: 28px;
  background: none;
  border: none;
  color: white;
  cursor: pointer;
  z-index: 9999;
}

/* ================= SCOREBOARD ================= */
.scoreboard {
  width:95%;
  background:#1e1e1e;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
  text-align:center;
}

/* TEAM ROW (CENTERED STACKS) */
.team-row {
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

/* TEAM BLOCK */
.team-block {
  width:42%;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* LOGOS */
.team-logo {
  width:46px;
  height:46px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #fff;
  margin-bottom:4px;
}

/* TEXT */
.team-name {
  font-size:18px;
  font-weight:bold;
}

.team-goals {
  font-size:38px;
  font-weight:bold;
  margin-top:2px;
}

.team-shots {
  font-size:18px;
  opacity:0.9;
}

/* DASH */
#dash {
  font-size:28px;
  align-self:center;
  opacity:0.7;
}

/* ================= CLOCK ================= */
.clock-section {
  display:flex;
  justify-content:space-between;
  align-items:center;
  width:95%;
  background:#1d1d1d;
  border-radius:12px;
  padding:10px;
  margin-bottom:12px;
}

.clock-section button {
  flex:1;
  margin:0 4px;
  padding:14px 0;
  border:none;
  border-radius:8px;
  background:#333;
  color:#fff;
}

#timer {
  font-size:28px;
  font-weight:bold;
}

#period {
  font-size:18px;
}

/* ================= START ================= */
#startStopBtn {
  width:95%;
  padding:40px 0;
  font-size:28px;
  border:none;
  border-radius:12px;
  background:#28a745;
  color:#fff;
  margin-bottom:12px;
}

/* ================= CONTROLS ================= */
.team-controls {
  display:flex;
  width:95%;
  gap:10px;
}

.team-column {
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
}

button {
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.05s ease, opacity 0.05s ease;
}

button:active {
  transform: scale(0.92);
  opacity:0.7;
}

button.plus {
  font-size:26px;
  padding:40px 0;
  border:none;
  border-radius:10px;
  background:#555;
  color:#fff;
}

button.minus {
  font-size:24px;
  padding:12px 0;
  border:none;
  border-radius:10px;
  background:#777;
  color:#fff;
}

/* ================= ANIMATIONS ================= */
.flash-green {
  animation: flashGreen 1s ease;
  font-weight:bold;
}

.flash-red {
  animation: flashRed 1s ease;
  font-weight:bold;
}

@keyframes flashGreen {
  0% { color:#fff; }
  40% { color:#28a745; }
  100% { color:#fff; }
}

@keyframes flashRed {
  0% { color:#fff; }
  40% { color:#dc3545; }
  100% { color:#fff; }
}

.pop {
  animation: popAnim 0.25s ease;
}

@keyframes popAnim {
  0% { transform:scale(1); }
  50% { transform:scale(1.25); }
  100% { transform:scale(1); }
}
</style>
</head>

<body>

<button class="settings-btn" onclick="openSettings()">⚙️</button>

<div class="scoreboard">

  <div class="team-row">

    <div class="team-block">
      <img id="teamALogo" class="team-logo">
      <div id="teamAName" class="team-name">Team A</div>
      <div id="teamAScore" class="team-goals">0</div>
      <div id="teamAShots" class="team-shots">Shots: 0</div>
    </div>

    <div id="dash">-</div>

    <div class="team-block">
      <img id="teamBLogo" class="team-logo">
      <div id="teamBName" class="team-name">Team B</div>
      <div id="teamBScore" class="team-goals">0</div>
      <div id="teamBShots" class="team-shots">Shots: 0</div>
    </div>

  </div>
</div>

<div class="clock-section">
  <button onclick="setPeriod()">Period</button>

  <div style="flex:2;text-align:center;">
    <div id="timer">20:00</div>
    <div id="period">Period 1</div>
  </div>

  <button onclick="setClock()">Clock</button>
</div>

<button id="startStopBtn" onclick="toggleClock()">Start</button>

<div class="team-controls">
  <div class="team-column">
    <button class="plus" onclick="updateShots('A',1)">+1 Shot</button>
    <button class="minus" onclick="updateShots('A',-1)">-1 Shot</button>
    <button class="plus" onclick="updateScore('A',1)">+1 Goal</button>
    <button class="minus" onclick="updateScore('A',-1)">-1 Goal</button>
  </div>

  <div class="team-column">
    <button class="plus" onclick="updateShots('B',1)">+1 Shot</button>
    <button class="minus" onclick="updateShots('B',-1)">-1 Shot</button>
    <button class="plus" onclick="updateScore('B',1)">+1 Goal</button>
    <button class="minus" onclick="updateScore('B',-1)">-1 Goal</button>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyD8EO--akOZZZNKGOEHk4mpc4Gk-1WXbiHyvVIOaSmxI5f20Wiwwh7XIyEc4TaOlxD/exec";

let state = {
  teamAName:"Team A",
  teamAScore:0,
  teamAShots:0,
  teamBName:"Team B",
  teamBScore:0,
  teamBShots:0,
  Period:1,
  TimerSeconds:1200,
  Running:false
};

function animate(id, type){
  const el = document.getElementById(id);
  el.classList.remove("flash-green","flash-red","pop");
  void el.offsetWidth;
  el.classList.add("pop");
  if(type==="green") el.classList.add("flash-green");
  if(type==="red") el.classList.add("flash-red");
  setTimeout(()=>el.classList.remove("flash-green","flash-red"),1000);
}

/* ================= CORE UI ================= */
function updateUI(){
  document.getElementById("teamAName").textContent=state.teamAName;
  document.getElementById("teamBName").textContent=state.teamBName;

  document.getElementById("teamAScore").textContent=state.teamAScore;
  document.getElementById("teamBScore").textContent=state.teamBScore;

  document.getElementById("teamAShots").textContent="Shots: "+state.teamAShots;
  document.getElementById("teamBShots").textContent="Shots: "+state.teamBShots;

  document.getElementById("timer").textContent=formatTime(state.TimerSeconds);
  document.getElementById("period").textContent="Period "+state.Period;

  const btn=document.getElementById("startStopBtn");
  btn.textContent=state.Running?"Stop":"Start";
  btn.style.background=state.Running?"#dc3545":"#28a745";
}

function formatTime(s){
  let m=Math.floor(s/60);
  let sec=s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

/* ================= ACTIONS ================= */
function toggleClock(){
  state.Running=!state.Running;
  updateUI();
  push("Running",state.Running);
}

function setClock(){
  let v=prompt("MM:SS");
  if(!v) return;
  let [m,s]=v.split(":").map(Number);
  state.TimerSeconds=m*60+s;
  updateUI();
  push("TimerSeconds",state.TimerSeconds);
}

function setPeriod(){
  let p=parseInt(prompt("Period"));
  if(p>0){
    state.Period=p;
    updateUI();
    push("Period",p);
  }
}

function updateScore(team,val){
  let key=team==="A"?"teamAScore":"teamBScore";
  let id=team==="A"?"teamAScore":"teamBScore";
  state[key]=Math.max(0,state[key]+val);
  updateUI();
  push(key,state[key]);
  animate(id,val>0?"green":"red");
}

function updateShots(team,val){
  let key=team==="A"?"teamAShots":"teamBShots";
  state[key]=Math.max(0,state[key]+val);
  updateUI();
  push(key,state[key]);
}

/* ================= SYNC ================= */
async function push(field,value){
  await fetch(`${SCRIPT_URL}?update=true&field=${field}&value=${value}`);
}

/* ================= INIT ================= */
async function init(){
  const res=await fetch(SCRIPT_URL);
  const data=await res.json();
  Object.assign(state,data);

  document.getElementById("teamALogo").src=data.teamALogo;
  document.getElementById("teamBLogo").src=data.teamBLogo;

  updateUI();
}

init();
</script>

</body>
</html>
