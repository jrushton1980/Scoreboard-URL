<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoreboard Control</title>

<style>
body {
  background-color: #111;
  color: #fff;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.scoreboard {
  width: 95%;
  background: #1e1e1e;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 12px;
  text-align: center;
}

.team-row {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
  font-size: 18px;
}

.score-row {
  display: flex;
  justify-content: space-between;
  font-size: 36px;
  margin-top: 6px;
}

/* 🔥 Bigger shots text */
.shots-row {
  display: flex;
  justify-content: space-between;
  font-size: 20px;
  margin-top: 4px;
  opacity: 0.9;
}

/* 🔥 Enhanced button press feel */
button {
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.04s ease, opacity 0.04s ease;
}

button:active {
  transform: scale(0.90);
  opacity: 0.7;
}

.clock-section {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 95%;
  background: #1d1d1d;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 12px;
}

.clock-section button {
  flex: 1;
  font-size: 18px;
  padding: 14px 0;
  margin: 0 4px;
  border-radius: 8px;
  border: none;
  background-color: #333;
  color: #fff;
}

#timer {
  font-size: 28px;
  font-weight: bold;
  text-align: center;
}

#period {
  font-size: 18px;
  text-align: center;
}

#startStopBtn {
  width: 95%;
  font-size: 28px;
  padding: 40px 0;
  border-radius: 12px;
  border: none;
  color: white;
  background-color: #28a745;
  margin-bottom: 16px;
}

/* Pulse */
.pulse {
  animation: pulseAnim 1.2s infinite;
}

@keyframes pulseAnim {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

.team-controls {
  display: flex;
  justify-content: space-between;
  width: 95%;
  gap: 10px;
}

.team-column {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.team-column button.plus {
  font-size: 24px;
  padding: 40px 0;
  border-radius: 10px;
  border: none;
  background-color: #555;
  color: #fff;
}

.team-column button.minus {
  font-size: 24px;
  padding: 12px 0;
  border-radius: 10px;
  border: none;
  background-color: #777;
  color: #fff;
}

/* 🔥 Score animations */
.score-pop {
  animation: pop 0.25s ease;
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.4); }
  100% { transform: scale(1); }
}

/* 🔥 Longer + bold feedback */
.flash-green {
  animation: flashGreen 1s ease;
  font-weight: bold;
}

.flash-red {
  animation: flashRed 1s ease;
  font-weight: bold;
}

@keyframes flashGreen {
  0% { color: #fff; }
  40% { color: #28a745; }
  100% { color: #fff; }
}

@keyframes flashRed {
  0% { color: #fff; }
  40% { color: #dc3545; }
  100% { color: #fff; }
}

.settings-btn {
  position: fixed;
  top: 10px;
  right: 10px;
  background: none;
  border: none;
  color: #fff;
  font-size: 28px;
}

</style>
</head>

<body>

<button class="settings-btn" onclick="openSettings()">⚙️</button>

<div class="scoreboard">
  <div class="team-row">
    <span id="teamAName">Team A</span>
    <span id="teamBName">Team B</span>
  </div>

  <div class="score-row">
    <span id="teamAScore">0</span>
    <span>-</span>
    <span id="teamBScore">0</span>
  </div>

  <div class="shots-row">
    <span id="teamAShots">Shots: 0</span>
    <span id="teamBShots">Shots: 0</span>
  </div>
</div>

<div class="clock-section">
  <button onclick="setPeriod()">Period</button>

  <div style="flex:2;">
    <div id="timer">20:00</div>
    <div id="period">Period 1</div>
  </div>

  <button onclick="setClock()">Clock</button>
</div>

<button id="startStopBtn" onclick="toggleClock()">Start</button>

<div class="team-controls">
  <div class="team-column">
    <button class="plus" onclick="updateShots('A',1)">+1 Shot</button>
    <button class="minus" onclick="updateShots('A',-1)">-1 Shot</button>
    <button class="plus" onclick="updateScore('A',1)">+1 Goal</button>
    <button class="minus" onclick="updateScore('A',-1)">-1 Goal</button>
  </div>

  <div class="team-column">
    <button class="plus" onclick="updateShots('B',1)">+1 Shot</button>
    <button class="minus" onclick="updateShots('B',-1)">-1 Shot</button>
    <button class="plus" onclick="updateScore('B',1)">+1 Goal</button>
    <button class="minus" onclick="updateScore('B',-1)">-1 Goal</button>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyD8EO--akOZZZNKGOEHk4mpc4Gk-1WXbiHyvVIOaSmxI5f20Wiwwh7XIyEc4TaOlxD/exec";

let state = {teamAName:"Team A", teamAScore:0, teamAShots:0, teamBName:"Team B", teamBScore:0, teamBShots:0, Period:1, TimerSeconds:1200, Running:false};
let timerInterval;

/* 🔥 Animation helper */
function animateValue(id, change){
  const el = document.getElementById(id);

  el.classList.remove("score-pop","flash-green","flash-red");
  void el.offsetWidth;

  el.classList.add("score-pop");
  el.classList.add(change > 0 ? "flash-green" : "flash-red");

  setTimeout(()=>{
    el.classList.remove("flash-green","flash-red");
  },1000);
}

function updateUI(){
  document.getElementById('teamAName').textContent=state.teamAName;
  document.getElementById('teamBName').textContent=state.teamBName;
  document.getElementById('teamAScore').textContent=state.teamAScore;
  document.getElementById('teamBScore').textContent=state.teamBScore;
  document.getElementById('teamAShots').textContent=`Shots: ${state.teamAShots}`;
  document.getElementById('teamBShots').textContent=`Shots: ${state.teamBShots}`;
  document.getElementById('timer').textContent=formatTime(state.TimerSeconds);
  document.getElementById('period').textContent=`Period ${state.Period}`;

  const btn = document.getElementById('startStopBtn');
  btn.textContent = state.Running ? "Stop" : "Start";
  btn.style.backgroundColor = state.Running ? "#dc3545" : "#28a745";
  btn.classList.toggle("pulse", state.Running);
}

function formatTime(sec){
  const m=Math.floor(sec/60);
  const s=sec%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function toggleClock(){
  state.Running=!state.Running;
  if(state.Running) startTimer(); else stopTimer();
  updateUI();
  pushUpdate("Running",state.Running);
}

function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(state.TimerSeconds>0){
      state.TimerSeconds--;
      document.getElementById('timer').textContent=formatTime(state.TimerSeconds);
      pushUpdate("TimerSeconds",state.TimerSeconds);
    }
  },1000);
}

function stopTimer(){
  clearInterval(timerInterval);
}

function setClock(){
  const input=prompt("Enter time (MM:SS):");
  if(input && /^\d{1,2}:\d{2}$/.test(input)){
    const [m,s]=input.split(':').map(Number);
    state.TimerSeconds=m*60+s;
    updateUI();
    pushUpdate("TimerSeconds",state.TimerSeconds);
  }
}

function setPeriod(){
  const val=parseInt(prompt("Enter period number:"));
  if(!isNaN(val)&&val>0){
    state.Period=val;
    updateUI();
    pushUpdate("Period",val);
  }
}

function updateScore(team,change){
  const key=team==="A"?"teamAScore":"teamBScore";
  const el=team==="A"?"teamAScore":"teamBScore";
  state[key]=Math.max(0,state[key]+change);
  updateUI();
  animateValue(el,change);
  pushUpdate(key,state[key]);
}

function updateShots(team,change){
  const key=team==="A"?"teamAShots":"teamBShots";
  const el=team==="A"?"teamAShots":"teamBShots";
  state[key]=Math.max(0,state[key]+change);
  updateUI();
  animateValue(el,change);
  pushUpdate(key,state[key]);
}

async function pushUpdate(field,value){
  await fetch(`${SCRIPT_URL}?update=true&field=${field}&value=${encodeURIComponent(value)}`);
}

async function init(){
  try{
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();
    Object.assign(state,data);
  } catch(e){}
  updateUI();
}

init();
</script>

</body>
</html>
